<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrivacyGuard AI Protector | Security Logs</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 40px; }
        h1 { color: #38bdf8; border-bottom: 2px solid #1e293b; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e293b; border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #334155; color: #38bdf8; }
        .type-badge { background: #7f1d1d; color: #fecaca; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .no-logs { padding: 20px; text-align: center; color: #64748b; }
    </style>
</head>
<body>
    <h1>Security Activity Logs</h1>
    <table id="logTable">
        <thead>
            <tr>
                <th>Timestamp</th>
                <th>Leak Type</th>
                <th>Platform</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="logBody">
            </tbody>
    </table>

    <script src="logs.js"></script>
</body>
</html>
